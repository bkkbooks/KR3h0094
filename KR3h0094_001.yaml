body:
  text: 筆經一卷漢時諸邵獻兔毫出鴻都惟有趙國毫中用時人咸言兔毫無優劣管手有巧拙有人以緑沉漆竹管及鏤管見遺録之多年斯亦可愛玩詎必金寶雕琢然後為寶也昔人或以琉璃象牙為筆管麗飾則有之然筆須輕便重則躓矣諸郡毫惟中山兔肥而毫長可用先用人髮杪數十莖雜青羊毛并兔毳裁令齊平以麻紙裏枝根令淨次取上毫薄薄布柱上令柱不見世傳張芝鍾繇用鼠鬚筆筆鋒徑強有鋒芒余未之信鼠鬚用未必能佳甚難得嶺外少兔以雞毛作筆亦妙蜀中石鼠毛可以為筆其名曰𪕞人鬚作筆甚佳漢製天子筆以錯寶為跗晉武賜張華麟角筆管製筆之法桀者居前毳者居後強者為刃要者為輔參之以檾朿之以管固以漆液澤以海藻濡墨而試直中繩勾中鉤方圓中矩規終日握而不敗故曰筆妙
